version: "1"

services:
  # 1. Consensus Backend (All-in-one Free Tier)
  # This runs the Gateway, Agent Worker, and MCP Tool server in a single 
  # free instance to avoid Render's $7/mo minimum for background workers.
  - type: web
    name: consensus-backend
    env: python
    plan: free
    buildCommand: "pip install -r gateway/requirements.txt -r agent/requirements.txt -r mcp/search/requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: GOOGLE_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: "https://cloud.langfuse.com"
