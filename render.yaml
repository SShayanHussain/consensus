version: "1"

services:
  # 1. FastAPI Gateway (Web Service)
  - type: web
    name: consensus-gateway
    env: python
    buildCommand: "cd gateway && pip install -r requirements.txt"
    startCommand: "cd gateway && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: "https://your-vercel-app-url.vercel.app"

  # 2. Agent Worker (Background Worker)
  # Note: Render's Free Tier does not include Background Workers. 
  # This service will cost ~$7/mo on Render, or you can merge it into the Gateway to keep it 100% free.
  - type: worker
    name: consensus-agent
    env: python
    buildCommand: "cd agent && pip install -r requirements.txt"
    startCommand: "cd agent && rq worker -u $REDIS_URL"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_HOST
        value: "https://cloud.langfuse.com"

  # 3. MCP Search Tool (Web Service)
  - type: web
    name: consensus-mcp-search
    env: python
    buildCommand: "cd mcp/search && pip install -r requirements.txt"
    startCommand: "cd mcp/search && uvicorn server:app --host 0.0.0.0 --port $PORT"
